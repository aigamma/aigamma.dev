<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicons/positive/icon16.png?v=2" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-48" rel="icon" type="image/png" sizes="48x48" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-128" rel="icon" type="image/png" sizes="128x128" href="/favicons/positive/icon32.png?v=2" />
    <!-- Start the cdn.plot.ly handshake during HTML parse and kick off the
         Plotly download in parallel with the React bundle. usePlotly.js
         appends a <script> with this exact URL (no crossorigin attribute =
         no-cors mode) so the preload hit is reused rather than duplicated.
         Keep the URL in sync with src/hooks/usePlotly.js. -->
    <link rel="preconnect" href="https://cdn.plot.ly" />
    <link rel="preload" as="script" href="https://cdn.plot.ly/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma — SPX Gamma Exposure & Volatility Dashboard</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AI Gamma",
      "url": "https://aigamma.com/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "description": "SPX zero-DTE and monthly options gamma exposure dashboard with computed dealer positioning levels, implied volatility surfaces, and Breeden-Litzenberger risk-neutral density plots.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AI Gamma",
        "url": "https://about.aigamma.com/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kick off the two /api/data fetches (today and the prior trading day)
      // as soon as the HTML parser reaches this inline script, rather than
      // waiting for the main bundle to download and parse, React to hydrate,
      // and useOptionsData's useEffect to fire. Both URLs are identical
      // byte-for-byte to the ones useOptionsData.js constructs on a cold
      // mount with no expiration / tradingDate overrides and v=2 matching
      // WIRE_VERSION in the hook. The hook drains window.__apiBoot.today /
      // prevDay on its first fetch; on rejection or on retryCount > 0 the
      // hook falls through to a regular fetch. The .catch() tails silence
      // the uncaught-promise warning between the early fetch failing and
      // the hook taking over to surface the error through setError.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        // Today's and the prior-trading-day's options chains (big payloads,
        // both needed the moment React mounts).
        var pToday = boot('/api/data?underlying=SPX&snapshot_type=intraday&v=2');
        var pPrev = boot('/api/data?underlying=SPX&snapshot_type=intraday&prev_day=1&v=2');
        // /api/vrp-history feeds VolatilityRiskPremium (an above-the-fold
        // card) and the VRP pill in LevelsPanel. Prefiring shaves another
        // ~50-200 ms off the VRP chart paint on cold visits by overlapping
        // its ~35 KB gzipped download with the main bundle transit.
        // useHistoricalData.js's sharedFetch helper checks for this promise
        // via window.__apiBoot.vrpHistory and consumes it on first read.
        var pVrp = boot('/api/vrp-history');
        pToday.catch(function () {});
        pPrev.catch(function () {});
        pVrp.catch(function () {});
        window.__apiBoot = { today: pToday, prevDay: pPrev, vrpHistory: pVrp };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
