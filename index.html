<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="favicon-16" rel="icon" type="image/png" sizes="16x16" href="/favicons/positive/icon16.png?v=2" />
    <link id="favicon-32" rel="icon" type="image/png" sizes="32x32" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-48" rel="icon" type="image/png" sizes="48x48" href="/favicons/positive/icon32.png?v=2" />
    <link id="favicon-128" rel="icon" type="image/png" sizes="128x128" href="/favicons/positive/icon32.png?v=2" />
    <!-- Self-hosted plotly-cartesian-2.35.2.min.js. Same origin means no
         extra DNS/TLS handshake (vs the old cdn.plot.ly fetch), the Netlify
         immutable Cache-Control applies via netlify.toml's /vendor/* rule,
         and the download multiplexes over the same HTTP/2 connection as
         the main React bundle. usePlotly.js appends a <script> with this
         exact URL (no crossorigin attribute = no-cors mode) so the preload
         hit is reused instead of firing a second request. Keep the URL in
         sync with src/hooks/usePlotly.js. -->
    <link rel="preload" as="script" href="/vendor/plotly-cartesian-2.35.2.min.js" />
    <title>AI Gamma: SPX Gamma Exposure & Volatility Dashboard</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AI Gamma",
      "url": "https://aigamma.com/",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "description": "SPX zero-DTE and monthly options gamma exposure dashboard with computed dealer positioning levels, dealer-gamma regime classification, vol-flip and put/call wall analytics, and a tactical-vol companion lab covering volatility risk premium, term structure, smile fits, and Breeden-Litzenberger risk-neutral density.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AI Gamma",
        "url": "https://about.aigamma.com/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Kick off the two /api/data fetches (today and the prior trading day)
      // as soon as the HTML parser reaches this inline script, rather than
      // waiting for the main bundle to download and parse, React to hydrate,
      // and useOptionsData's useEffect to fire. Both URLs are identical
      // byte-for-byte to the ones useOptionsData.js constructs on a cold
      // mount with no expiration / tradingDate overrides and v=2 matching
      // WIRE_VERSION in the hook. The hook drains window.__apiBoot.today /
      // prevDay on its first fetch; on rejection or on retryCount > 0 the
      // hook falls through to a regular fetch. The .catch() tails silence
      // the uncaught-promise warning between the early fetch failing and
      // the hook taking over to surface the error through setError.
      (function () {
        function boot(url) {
          return fetch(url).then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error('API ' + r.status + ': ' + t); });
            return r.json();
          });
        }
        // Today's full options chain (~247 KB brotli) and the prior trading
        // day's LITE payload (~5-10 KB brotli, no contracts). Above-the-fold
        // LevelsPanel + overnight-alignment only need prev-day levels and
        // expirationMetrics — both scalar sub-objects — not the 19k-contract
        // chain. The remaining prev-day-aware chart on this page is
        // GexProfile's overlay; it pulls the full prev-day contracts from a
        // post-first-paint idle fetch in App.jsx that omits the
        // skip_contracts flag. Net saving on the boot transit: ~240 KB br
        // / ~500 ms on mobile 4G per cold first visit.
        var pToday = boot('/api/data?underlying=SPX&snapshot_type=intraday&v=2');
        var pPrev = boot('/api/data?underlying=SPX&snapshot_type=intraday&prev_day=1&skip_contracts=1&v=2');
        // /api/vrp-history feeds the VRP pill in LevelsPanel. The full VRP
        // chart card moved to /tactical/, but the pill stays on this page as
        // part of the at-a-glance scalar status row, so the boot fetch keeps
        // its place here. Prefiring overlaps its ~25 KB gzipped download
        // with the main bundle transit and shaves ~50-200 ms off the VRP
        // pill paint.
        var pVrp = boot('/api/vrp-history');
        // /api/gex-history feeds DealerGammaRegime, GammaIndexOscillator,
        // and GammaIndexScatter — all LazyMounted below-the-fold. Pre-
        // firing adds ~45 KB gzipped of transit that a reader who bounces
        // above the fold never benefits from, but any reader who scrolls
        // (the overwhelmingly common case on a dashboard designed to be
        // scrolled through) gets all three charts' data ready before the
        // IntersectionObserver triggers their mount. sharedFetch keys its
        // cache on URL so all three consumers share the single booted
        // promise.
        var pGex = boot('/api/gex-history');
        pToday.catch(function () {});
        pPrev.catch(function () {});
        pVrp.catch(function () {});
        pGex.catch(function () {});
        window.__apiBoot = {
          today: pToday,
          prevDay: pPrev,
          vrpHistory: pVrp,
          gexHistory: pGex,
        };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
