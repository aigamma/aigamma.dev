[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Specific /api/snapshot.json redirect MUST come before the /api/* wildcard —
# otherwise the wildcard expands :splat to `snapshot.json` and Netlify looks
# for a function literally named `snapshot.json` (which doesn't exist). The
# `force = true` flag makes the rewrite apply even if a static file with
# this path is ever added under publish, belt-and-suspenders for the
# extension contract that the URL stays a function response.
[[redirects]]
  from = "/api/snapshot.json"
  to = "/.netlify/functions/snapshot"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Pretty-URL rewrite for the Chrome Web Store-required privacy policy page.
# The static file is published as dist/extension-privacy.html; this rewrite
# keeps the public URL extensionless. Netlify's implicit pretty-URL behavior
# handles this in production asset serving, but netlify dev proxies through
# Vite which treats unknown routes as SPA fallbacks (returning index.html);
# an explicit 200 rewrite normalizes behavior across local and production.
[[redirects]]
  from = "/extension-privacy"
  to = "/extension-privacy.html"
  status = 200

# Platform-level headers for the extension snapshot endpoint. Duplicates
# what snapshot.mjs sets in its Response — the function is authoritative
# on the 200 path, but having these at the edge guarantees the CORS
# header is present even if the function short-circuits before its own
# headers are written (cold-start error, import failure, etc). The
# extension has zero permissions and depends entirely on CORS for the
# cross-origin fetch to succeed.
[[headers]]
  for = "/api/snapshot.json"
  [headers.values]
    Cache-Control = "public, max-age=30, s-maxage=30"
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

# Content-hashed Vite build output lives under /assets/ with filenames
# like main-DPDCnbYA.js — the hash IS the version key, so the URL is
# immutable by construction and the bytes at that URL never change. The
# Netlify default of max-age=0, must-revalidate forces every repeat visit
# to issue a conditional request (If-None-Match → 304 Not Modified) against
# every chunk in the HTML's modulepreload manifest, which on a 4G mobile
# connection is ~50-150 ms of waterfall per chunk and ~12 round-trips on
# the main dashboard's import graph. Setting max-age=1 year + immutable
# lets the browser serve cached chunks directly without any server touch,
# removing the entire revalidation chain from the repeat-visit critical
# path. A deploy that changes chunk content generates new filenames
# automatically (content-hash rename), so stale caches can't be served
# across deploys. This header covers the JS / CSS / worker bundles Vite
# emits under /assets/.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon PNGs are cache-busted via ?v=N query params in index.html (see
# the favicon <link> tags), so the URLs are effectively hashed by the
# query string and can also be cached long. Bumping the v param in HTML
# forces the re-fetch the next time the icon artwork changes.
[[headers]]
  for = "/favicons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /vendor/* hosts third-party libraries that are version-pinned in their
# filenames (e.g., plotly-cartesian-2.35.2.min.js — the 2.35.2 version
# string acts as the cache key). Upgrading Plotly means shipping a new
# file with a different version in the name and updating the HTML preload
# + usePlotly.js src references; old cached copies are orphaned but
# harmless. 1-year immutable is safe because the URL itself encodes the
# version.
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Logo is not hash-named and not cache-busted, so it gets a moderate TTL
# that balances repeat-visit speed against propagation of a future logo
# update. A week (604800s) means most recurring readers avoid the re-
# fetch, and any logo swap propagates fully within that window.
[[headers]]
  for = "/logo.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"
